name: ci-cd

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  GHCR_OWNER: atirado-snyk
  ACR_NAME: housingnotesacr
  ACR_LOGIN_SERVER: housingnotesacr.azurecr.io
  AKS_RESOURCE_GROUP: housing-notes-rg
  AKS_CLUSTER_NAME: housing-notes-aks
  IMAGE_BACKEND: housing-notes-backend
  IMAGE_FRONTEND: housing-notes-frontend

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  ci:
    name: ci (install, lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  images:
    name: build & push images (ghcr + acr)
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${ACR_NAME}"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_FRONTEND }}:latest

  infra:
    name: terraform apply
    runs-on: ubuntu-latest
    needs: images
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: infra
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -auto-approve

  deploy:
    name: deploy to aks
    runs-on: ubuntu-latest
    needs: [images, infra]
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Ensure nginx ingress controller is installed
        run: |
          set -euo pipefail
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/cloud/deploy.yaml
          kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=5m

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Set images to current tag
        env:
          IMAGE_TAG: ${{ needs.images.outputs.image_tag }}
        run: |
          set -euo pipefail
          kubectl -n housing-notes set image deployment/backend \
            backend="${ACR_LOGIN_SERVER}/${IMAGE_BACKEND}:${IMAGE_TAG}"
          kubectl -n housing-notes set image deployment/frontend \
            frontend="${ACR_LOGIN_SERVER}/${IMAGE_FRONTEND}:${IMAGE_TAG}"

      - name: Wait for rollout
        run: |
          set -euo pipefail
          kubectl -n housing-notes rollout status deployment/backend --timeout=5m
          kubectl -n housing-notes rollout status deployment/frontend --timeout=5m
