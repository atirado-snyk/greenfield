name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  ACR_NAME: housingnotesacr
  ACR_LOGIN_SERVER: housingnotesacr.azurecr.io
  GHCR_OWNER: atirado-snyk
  AKS_NAME: housing-notes-aks
  AKS_RG: housing-notes-rg

jobs:
  ci:
    name: install, lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  deploy:
    name: build, push, terraform, deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init

      - name: Terraform apply
        working-directory: infra
        env:
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform apply -auto-approve

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: GHCR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/housing-notes-backend:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/housing-notes-backend:latest
            ghcr.io/${{ env.GHCR_OWNER }}/housing-notes-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.GHCR_OWNER }}/housing-notes-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/housing-notes-frontend:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/housing-notes-frontend:latest
            ghcr.io/${{ env.GHCR_OWNER }}/housing-notes-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.GHCR_OWNER }}/housing-notes-frontend:latest

      - name: Fetch AKS credentials
        run: az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_NAME" --admin --overwrite-existing

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install or upgrade nginx ingress controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace \
            --version 4.11.3 \
            --set controller.service.type=LoadBalancer \
            --wait --timeout 5m

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Roll out new images
        run: |
          kubectl set image deployment/backend backend="$ACR_LOGIN_SERVER/housing-notes-backend:$IMAGE_TAG"
          kubectl set image deployment/frontend frontend="$ACR_LOGIN_SERVER/housing-notes-frontend:$IMAGE_TAG"
          kubectl rollout status deployment/backend --timeout=5m
          kubectl rollout status deployment/frontend --timeout=5m

      - name: Show ingress address
        run: kubectl get ingress housing-notes -o wide
